<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI G Assistant</title>
    <style>
        :root { --primary: #6366f1; }
        body { font-family: sans-serif; background: #0f172a; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .phone { width: 100%; max-width: 500px; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 45px 20px 20px; background: #fff; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 700; font-size: 22px; color: var(--primary); }
        .chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f8fafc; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 85%; line-height: 1.5; animation: fadeIn 0.2s ease; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: white; color: #1e293b; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .typing { font-size: 11px; color: #94a3b8; margin: 5px 25px; display: none; font-style: italic; }
        .input-bar { padding: 15px 20px; background: white; display: flex; align-items: center; gap: 12px; border-top: 1px solid #f1f5f9; padding-bottom: 30px; }
        input { flex: 1; border: none; padding: 12px 18px; background: #f1f5f9; border-radius: 20px; outline: none; font-size: 14px; }
        .send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">AI G Assistant</div>
        <div class="chat" id="chat">
            <div class="msg ai">Привет! Я <b>AI G</b>. Теперь я в сети 24/7!</div>
        </div>
        <div id="typing" class="typing">AI G печатает...</div>
        <div class="input-bar">
            <input type="text" id="query" placeholder="Сообщение...">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // ВАЖНО: Вставь сюда свою ссылку от Render
        const SERVER_URL = "https://my-ai-g-server.onrender.com/ask_ai";

        async function sendMessage() {
            const input = document.getElementById('query');
            const chat = document.getElementById('chat');
            const typing = document.getElementById('typing');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            typing.style.display = 'block';

            try {
                const response = await fetch(`${SERVER_URL}?question=${encodeURIComponent(text)}`);
                const data = await response.json();
                typing.style.display = 'none';
                
                if (data.answer) {
                    chat.innerHTML += `<div class="msg ai">${data.answer}</div>`;
                } else {
                    chat.innerHTML += `<div class="msg ai" style="color:red">Ошибка: неверный формат ответа</div>`;
                }
            } catch (e) {
                typing.style.display = 'none';
                chat.innerHTML += `<div class="msg ai" style="color:red">Не удалось связаться с сервером</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
