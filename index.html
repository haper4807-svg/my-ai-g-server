<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI G Assistant</title>
    <style>
        :root { --primary: #6366f1; }
        * { box-sizing: border-box; }
        .phone { position: fixed;top: 0;left: 0;width: 100vw;height: 100vh;z-index: 9999; }
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .phone { width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; }
        .header { padding: 50px 20px 15px; background: #fff; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 700; font-size: 20px; color: var(--primary); }
        .chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f8fafc; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: white; color: #1e293b; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .typing { font-size: 11px; color: #94a3b8; margin: 5px 15px; display: none; font-style: italic; }
        .input-bar { padding: 15px 15px 35px 15px; background: white; display: flex; align-items: center; gap: 10px; border-top: 1px solid #f1f5f9; }
        input { flex: 1; border: none; padding: 12px 18px; background: #f1f5f9; border-radius: 25px; outline: none; font-size: 16px; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">AI G Assistant</div>
        <div class="chat" id="chat">
            <div class="msg ai">Привет! Я готов к общению. Напиши мне что-нибудь.</div>
        </div>
        <div id="typing" class="typing">AI G думает...</div>
        <div class="input-bar">
            <input type="text" id="query" placeholder="Сообщение..." onkeypress="if(event.keyCode==13) sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // Твоя ссылка на Render (проверь её!)
        const SERVER_URL = "https://my-ai-g-server.onrender.com/ask_ai";

        async function sendMessage() {
            const input = document.getElementById('query');
            const chat = document.getElementById('chat');
            const typing = document.getElementById('typing');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            typing.style.display = 'block';

            try {
                const response = await fetch(`${SERVER_URL}?question=${encodeURIComponent(text)}`);
                const data = await response.json();
                typing.style.display = 'none';
                if (data.answer) {
                    chat.innerHTML += `<div class="msg ai">${data.answer}</div>`;
                }
            } catch (e) {
                typing.style.display = 'none';
                chat.innerHTML += `<div class="msg ai" style="color:red">Ошибка связи с сервером. Проверьте интернет.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
