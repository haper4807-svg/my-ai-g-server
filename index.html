<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI G</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .phone { width: 100%; max-width: 500px; background: #ffffff; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 40px 20px 20px; background: #fff; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; font-size: 22px; color: #6366f1; }
        .chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f8fafc; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 85%; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: #6366f1; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .typing { font-size: 11px; color: #94a3b8; margin: 5px 25px; display: none; }
        .input-bar { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; padding-bottom: 30px; }
        input { flex: 1; border: none; padding: 12px; background: #f1f5f9; border-radius: 20px; outline: none; }
        button { background: #6366f1; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">AI G Assistant</div>
        <div class="chat" id="chat">
            <div class="msg ai">Я онлайн! О чем поговорим?</div>
        </div>
        <div id="typing" class="typing">AI G думает...</div>
        <div class="input-bar">
            <input type="text" id="query" placeholder="Сообщение...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // СЮДА ВСТАВЬ ССЫЛКУ ИЗ RENDER (ПРИМЕР: https://onrender.com)
        const SERVER_URL = "https://my-ai-g-server.onrender.com/ask_ai";

        async function sendMessage() {
            const input = document.getElementById('query');
            const chat = document.getElementById('chat');
            const typing = document.getElementById('typing');
            const text = input.value.trim();
            
            if (!text) return;

            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            typing.style.display = 'block';

            try {
                const response = await fetch(SERVER_URL + "?question=" + encodeURIComponent(text));
                const data = await response.json();
                typing.style.display = 'none';
                chat.innerHTML += `<div class="msg ai">${data.answer}</div>`;
            } catch (e) {
                typing.style.display = 'none';
                chat.innerHTML += `<div class="msg ai" style="color:red">Ошибка: не удалось связаться с AI G</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
